<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2e75b6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Clipboard body -->
  <rect x="16" y="18" width="32" height="38" rx="3" fill="white" opacity="0.95"/>
  <!-- Clipboard clip -->
  <rect x="24" y="14" width="16" height="8" rx="3" fill="#1e3a5f"/>
  <rect x="27" y="12" width="10" height="5" rx="2.5" fill="#2e75b6"/>
  <!-- Check lines -->
  <rect x="22" y="28" width="14" height="2.5" rx="1" fill="#2e75b6"/>
  <rect x="22" y="34" width="18" height="2.5" rx="1" fill="#d9e2ec"/>
  <rect x="22" y="40" width="12" height="2.5" rx="1" fill="#d9e2ec"/>
  <rect x="22" y="46" width="16" height="2.5" rx="1" fill="#d9e2ec"/>
  <!-- Checkmark circle -->
  <circle cx="44" cy="44" r="10" fill="#28a745"/>
  <polyline points="39,44 42.5,47.5 49,40" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
